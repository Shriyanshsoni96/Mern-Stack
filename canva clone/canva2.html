        <nav class="h-14 bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-600 text-white flex items-center justify-between px-6 shadow-md">

    <!-- Left Side -->
    <div class="flex items-center gap-8 text-[18px] font-semibold">

        <div class="cursor-pointer hover:opacity-80">File</div>

        <div class="cursor-pointer hover:opacity-80">Resize</div>

        <div class="flex items-center gap-2 cursor-pointer hover:opacity-80">
            <i class="fa-solid fa-pen"></i>
            <span>Editing</span>
            <i class="fa-solid fa-angle-down text-sm mt-1"></i>
        </div>

        <!-- Divider -->
        <div class="h-6 w-[1px] bg-white/40"></div>

        <!-- Undo Redo -->
        <div class="flex items-center gap-6 text-xl">

            <i class="fa-solid fa-rotate-left cursor-pointer hover:scale-110 transition"></i>

            <i class="fa-solid fa-rotate-right cursor-pointer hover:scale-110 transition"></i>

        </div>

        <!-- Divider -->
        <div class="h-6 w-[1px] bg-white/40"></div>

        <!-- Cloud -->
        <div class="relative">

            <div class="absolute -top-3 left-3 bg-pink-500 text-[10px] px-2 py-[1px] rounded-full">
                New
            </div>

           <i class="fa-solid fa-cloud"></i>

        </div>

    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-5">

        <div class="font-semibold cursor-pointer hover:opacity-80">
            Sample
        </div>

        <!-- Trial -->
        <div class="bg-white/10 border border-white/20 px-5 py-2 rounded-2xl flex items-center gap-2 backdrop-blur-md">

            <i class="fa-solid fa-crown text-yellow-300"></i>

            <span class="font-semibold">
                Start your trial for ₹0
            </span>

        </div>

        <!-- Avatar -->
        <div class="w-10 h-10 rounded-full bg-white-500 border-2 border-white overflow-hidden">
            <img src="resumepic.jpeg" class="w-full h-full object-cover">
        </div>

        <!-- Icons -->
        <div class="flex items-center gap-4 text-xl">

            <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center">
                <i class="fa-solid fa-chart-simple"></i>
            </div>

            <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center">
                <i class="fa-regular fa-message"></i>
            </div>

        </div>

        <!-- Present -->
        <div class="bg-white/10 px-5 py-2 rounded-xl flex items-center gap-3 font-semibold">

            <span>Present</span>

            <i class="fa-solid fa-angle-down text-sm"></i>

        </div>

        <!-- Share -->
        <button class="bg-white text-black font-semibold px-5 py-2 rounded-xl hover:bg-gray-100 transition">
            Share
        </button>

    </div>

</nav>

<div class="mx-4 mt-4">

    <div class="w-[340px] h-14 bg-white border border-purple-200 rounded-2xl flex items-center justify-between px-5 shadow-sm">

        <!-- Left -->
        <div class="flex items-center gap-4 text-gray-400">

            <i class="fa-solid fa-plus text-xl"></i>

            <input 
            type="text"
            placeholder="Describe your ideal design"
            class="outline-none text-gray-500 w-52 text-[17px]">

        </div>

        <!-- Right -->
        <i class="fa-solid fa-microphone text-gray-600 text-xl cursor-pointer"></i>

    </div>

</div>

<!-- Buttons -->
<div class="flex gap-4 px-4 mt-6">

    <!-- Generate -->
    <button class="w-44 h-12 bg-white border border-gray-300 rounded-2xl font-semibold text-[20px] flex items-center justify-center gap-3 shadow-sm">
        <i class="fa-solid fa-wand-magic-sparkles text-blue-500"></i>
        <span>Generate</span>

    </button>

    <!-- Search -->
    <button class="w-44 h-12 rounded-2xl text-white font-semibold text-[20px] bg-gradient-to-r from-purple-500 to-violet-600 shadow-md">

        Search

    </button>

</div>

    <div>Recently used</div>
    <div class="text-gray-600 text-[16px] cursor-pointer">See all</div>
</div>
