<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel</title>
    <style>
        table {
            border-spacing: 0;
            border: 1px solid rgb(0, 0, 0);
        }
        
        th,
        td {
            text-align: center;
            padding: 10px;
            border-spacing: 0;
            border: 1px solid rgb(0, 0, 0);
        }
        
    </style>
</head>
<body>
    <table>
        <tr>
            <th></th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th></th>
            <th colspan="2">4</th>
            <th colspan="2">6</th>
        </tr>
        <tr>
            <td>Mon</td>
            <td>c++</td>
            <td>HTML</td>
            <td>CSS</td>
            <td rowspan="7"><b>B<br><br>R<br><br>E<br><br>A<br><br>K</td></b>
            <td colspan="2">JAVA</td>
            <td colspan="2">C++</td>
        </tr>
        <tr>
            <td>Tue</td>
            <td rowspan="3">Hindi</td>
            <td colspan="2">Webdev</td>
            <td colspan="0.5">C++</td>
            <td>HTML</td>
            <td>Css</td>
            <td rowspan="2">OS</td>
        </tr>
        <tr>
            <td>Wed</td>
            <td colspan="2">C++</td>
            <td colspan="3">Django</td>
            
            
        </tr>
        <tr>
            <td>Thurs</td>
            <td colspan="2"> java</td>
            <td>English</td>
            <td>Go</td>
            <td colspan="2">Networks</td>
            
        </tr>
        <tr>
            <td>Fri</td>
            <td colspan="3">Data science</td>
            <td colspan="2">C++</td>
            <td>GO</td>
            <td>Python</td>
            
        </tr>
    </table>

</body>
</html>
