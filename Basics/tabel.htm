<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Felipa&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="tabel.css">


    <style>
        #break{
            background-color: rgb(141, 138, 138);
            text-align: center;
            color: rgb(255, 234, 0);
        }
    </style>
</head>
<body>
    <table>
        <tr id="head">
            <th></th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th></th>
            <th colspan="2">4</th>
            <th colspan="2">6</th>
        </tr>
        <tr>
            <td id="week">Mon</td>
            <td id="C">C++</td>
            <td id="HTML">HTML</td>
            <td id="css">CSS</td>
            <td rowspan="7" id="break"><b>B<br><br>R<br><br>E<br><br>A<br><br>K</td></b>
            <td colspan="2" id="JAVA">JAVA</td>
            <td colspan="2" id="C">C++</td>
        </tr>
        <tr>
            <td id="week" >Tue</td>
            <td rowspan="3" bgcolor="lightpink" >Hindi</td>
            <td colspan="2" bgcolor="wheat">Webdev</td>
            <td colspan="0.5" bgcolor="lightblue">C++</td>
            <td bgcolor="lavender">HTML</td>
            <td bgcolor="lemonchiffon">CSS</td>
            <td rowspan="2" bgcolor="lightgray">OS</td>
        </tr>
        <tr>
            <td id="week" >Wed</td>
            <td colspan="2" bgcolor="lightblue">C++</td>
            <td colspan="3" bgcolor="palevioletred">Django</td>
            
            
        </tr>
        <tr>
            <td id="week">Thurs</td>
            <td colspan="2" id="JAVA">JAVA</td>
            <td bgcolor="lightyellow">English</td>
            <td bgcolor="lightcoral">Go</td>
            <td colspan="2" bgcolor="aquamarine">Networks</td>
            
        </tr>
        <tr>
            <td id="week">Fri</td>
            <td colspan="3" bgcolor="darkcustard">Data science</td>
            <td colspan="2" bgcolor="lightblue">C++</td>
            <td bgcolor="coral ">GO</td>
            <td bgcolor="lightgreen">Python</td>
            
        </tr>
    </table>

<div>
    <button id="clickMe">Click Me</button>
    
</div>


</body>
</html>
