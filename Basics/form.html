<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <form action="self" method="post">
        <!-- Form fields will go here -->
        <div>
            <label for="medicine" >Medicine Name:</label>
            <input type="text" id="medicine" name="medicine" placeholder="Enter medicine name">
        </div>
        <br>
        <div>
            <label for="quantity" placeholder="Enter quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" placeholder="Enter quantity">
        </div>
        <br>
         <div>
            <p>Enter your name:</p>
            <label for="firstname" placeholder="Enter your name here ">Customers First Name</label>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your First name here">

             <label for="lastname" placeholder="Enter your name here ">Customers Last Name</label>
            <input type="text" id="lastname" name="lastname" placeholder="Enter your Last name here">
        </div>
        <br>
            <div>
                <label for="address" placeholder="Enter your address here">Customers Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter your address here">
            </div>
            <br>
            <div>
                <label for="contact" placeholder="Enter your contact number here">Customers Contact Number:</label>
                <input type="text" id="contact" name="contact" placeholder="Enter your contact number here">
            </div>
            <br>
            <div>
                <label for="email" placeholder="Enter your email here">Customers Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email here  ">
            </div>
            <br>
            <div>
                <label for="payment" placeholder="Enter your payment method here">Payment Method:</label>
                <input type="text" id="payment" name="payment" placeholder="Enter your payment method here">
            </div>
            <br>
            <div>
                <label for="delivery" placeholder="Enter your delivery method here">Delivery Method:</label>
                <input type="text" id="delivery" name="delivery" placeholder="Enter your delivery method here">
            </div>
            <br>
            <div>
                <label for="description" placeholder="Enter description here">Description:</label>
                <input type="text" id="description" name="description" placeholder="Enter description here">
            </div>
            <div>
                <label for="password" placeholder="Enter your password here">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password here">
            </div>
             <div>
            <input type="submit" value="Submit">
        </div>
    </form>

    width="800" height="550" title="leetcode" loading="lazy"></iframe>
